name: private_agent
description: "AI agent for Android"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.4.0

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # App management
  installed_apps: ^1.5.0
  url_launcher: ^6.3.0
  android_intent_plus: ^5.1.0

  # Contacts
  flutter_contacts: ^1.1.9+2

  # Permissions
  permission_handler: ^11.4.0

  # Storage
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0

  # Notifications
  flutter_local_notifications: ^18.0.0

  # System control
  volume_controller: ^2.0.8
  screen_brightness: ^1.0.1

  # Shizuku (optional)
  shizuku_api: ^1.2.2
  share_plus: ^13.2.0
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app-logo.png"
  min_sdk_size: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
